name: Playwright Java Tests with MCP

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install"

      #  START MCP SERVER
      - name: Start MCP Server
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &

      - name: Wait for server
        run: sleep 20

      #  TRIGGER TEST VIA API
      - name: Trigger MCP Test Execution
        run: |
          curl -X GET http://localhost:8080/run-tests

      #  Upload Reports
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            test-output/
            target/surefire-reports/
